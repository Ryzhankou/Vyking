kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
- role: control-plane
- role: worker
  extraPortMappings:
    - containerPort: 80
      hostPort: 8080
      protocol: TCP
  labels:
    tier: main
- role: worker
  extraPortMappings:
    - containerPort: 8081
      hostPort: 8081
      protocol: TCP
  labels:
    tier: frontend
- role: worker
  labels:
    tier: backend
