{{- if .Values.backend.secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "game.fullname" . }}-backend-secret
  namespace: {{ .Values.backend.namespace }}
  labels:
    {{- include "game.labels" . | nindent 4 }}
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.backend.secret.DB_PASSWORD | quote }}
{{- end }}
{{/*
  Note: Prefer using backend.existingSecret to reference an external secret
  (e.g. from infrastructure-archer-db) instead of backend.secret.
*/}}