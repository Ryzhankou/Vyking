apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "game.fullname" . }}-backend
  namespace: {{ .Values.backend.namespace }}
  labels:
    {{- include "game.labels" . | nindent 4 }}
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "game.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "game.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: {{ include "game.fullname" . }}-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret.name }}
                  key: {{ .Values.backend.existingSecret.passwordKey }}
          command:
            - sh
            - -c
            - |
              until mysql -h"${DB_HOST}" -P"${DB_PORT}" -u"${DB_USER}" -p"${DB_PASSWORD}" -e "SELECT 1" >/dev/null 2>&1; do
                echo "waiting for db connection"
                sleep 3
              done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "game.fullname" . }}-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.existingSecret.name }}
                  key: {{ .Values.backend.existingSecret.passwordKey }}
          startupProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}