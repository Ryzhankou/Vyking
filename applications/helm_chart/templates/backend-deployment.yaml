apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "game.fullname" . }}-backend
  namespace: {{ .Values.backend.namespace }}
  labels:
    {{- include "game.labels" . | nindent 4 }}
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "game.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "game.backend.selectorLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        {{- toYaml .Values.backend.nodeSelector | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ .Values.backend.env.DB_HOST }} {{ .Values.backend.env.DB_PORT }}; do
                echo "waiting for db"
                sleep 3
              done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.dbSecretName }}
                  key: {{ .Values.backend.dbSecretKey }}
          startupProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            failureThreshold: 30
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
