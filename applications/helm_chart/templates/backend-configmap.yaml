apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "game.fullname" . }}-backend-config
  namespace: {{ .Values.backend.namespace }}
  labels:
    {{- include "game.labels" . | nindent 4 }}
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.backend.config.DB_HOST | quote }}
  DB_PORT: {{ .Values.backend.config.DB_PORT | quote }}
  DB_NAME: {{ .Values.backend.config.DB_NAME | quote }}
  DB_USER: {{ .Values.backend.config.DB_USER | quote }}
  PORT: {{ .Values.backend.config.PORT | quote }}