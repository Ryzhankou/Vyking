apiVersion: v1
kind: Service
metadata:
  name: {{ include "game.fullname" . }}-backend
  namespace: {{ .Values.backend.namespace }}
  labels:
    {{- include "game.labels" . | nindent 4 }}
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "game.backend.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
