frontend:
  namespace: game-frontend
  replicaCount: 2
  nodeSelector:
    tier: frontend
  image:
    repository: your-registry/game-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

backend:
  namespace: game-backend
  replicaCount: 2
  nodeSelector:
    tier: backend
  image:
    repository: your-registry/game-backend
    tag: "latest"
    pullPolicy: IfNotPresent

  containerPort: 8080

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  config:
    # FQDN required when backend and MySQL are in different namespaces (e.g. App of Apps)
    DB_HOST: "infrastructure-archer-db.game-backend.svc.cluster.local"
    DB_PORT: "3306"
    DB_NAME: "gamedb"
    DB_USER: "gameuser"
    PORT: "8080"

  # Prefer existingSecret: reference secret from infrastructure chart (e.g. infrastructure-archer-db)
  existingSecret:
    name: "infrastructure-archer-db"
    passwordKey: "mysql-password"

  # Alternative: provide password inline (not recommended for production). Uncomment to use.
  # secret:
  #   DB_PASSWORD: "gamepass"

ingress:
  enabled: false
  className: "nginx"
  host: "game.example.com"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  tls:
    enabled: false
    secretName: "game-tls"