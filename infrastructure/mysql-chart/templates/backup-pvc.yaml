{{- if .Values.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mysql-chart.fullname" . }}-backup-pvc
  labels:
    {{- include "mysql-chart.backup.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.pvcSize | default "5Gi" | quote }}
{{- end }}
