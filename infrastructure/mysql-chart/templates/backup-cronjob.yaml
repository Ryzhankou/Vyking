{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mysql-chart.fullname" . }}-backup
  labels:
    {{- include "mysql-chart.backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "mysql-chart.backup.labels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mysql-backup
              image: {{ .Values.backup.image | quote }}
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  echo "[$(date)] Waiting for MySQL to be ready..."
                  until mysqladmin ping -h "${DB_HOST}" -P "${DB_PORT}" -u "${DB_USER}" -p"${DB_PASSWORD}" --silent 2>/dev/null; do
                    sleep 5
                  done
                  echo "[$(date)] MySQL is ready."
                  TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
                  BACKUP_FILE="/backups/gamedb_${TIMESTAMP}.sql.gz"
                  echo "[$(date)] Starting backup -> ${BACKUP_FILE}"
                  mysqldump \
                    --host="${DB_HOST}" \
                    --port="${DB_PORT}" \
                    --user="${DB_USER}" \
                    --password="${DB_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --databases "${DB_NAME}" \
                  | gzip > "${BACKUP_FILE}"
                  echo "[$(date)] Backup completed: ${BACKUP_FILE}"
                  find /backups -name "gamedb_*.sql.gz" -mtime +7 -delete
              env:
                - name: DB_HOST
                  value: {{ .Release.Name }}-archer-db
                - name: DB_PORT
                  value: "3306"
                - name: DB_NAME
                  value: "gamedb"
                - name: DB_USER
                  value: "gameuser"
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-archer-db
                      key: mysql-password
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ include "mysql-chart.fullname" . }}-backup-pvc
{{- end }}
