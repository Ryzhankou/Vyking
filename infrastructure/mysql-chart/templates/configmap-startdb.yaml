apiVersion: v1
kind: ConfigMap
metadata:
  name: archer-db-mysql-startdb
  labels:
    app.kubernetes.io/name: infrastructure-mysql
data:
  # Runs every MySQL startup - ensures gameuser@'%' exists for remote connections
  01-grant-remote.sh: |
    #!/bin/sh
    set -e
    ROOT_PW=$(cat /opt/bitnami/mysql/secrets/mysql-root-password)
    USER_PW=$(cat /opt/bitnami/mysql/secrets/mysql-password)
    mysql -uroot -p"${ROOT_PW}" -e "
      CREATE USER IF NOT EXISTS 'gameuser'@'%' IDENTIFIED BY '${USER_PW}';
      GRANT ALL PRIVILEGES ON gamedb.* TO 'gameuser'@'%';
      FLUSH PRIVILEGES;
    "
    echo "[startdb] Granted remote access to gameuser@'%'"
