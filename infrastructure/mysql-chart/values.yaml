# Infrastructure MySQL - Bitnami MySQL + backup CronJob
# Service: <release>-archer-db, Secret: <release>-archer-db (e.g. infrastructure-archer-db)
#
# For production: use auth.existingSecret for root/app passwords instead of plaintext.

# Init ConfigMap name. Must match archer-db.initdbScriptsConfigMap when overriding.
initConfigMapName: "archer-db-mysql-init"

archer-db:
  image:
    registry: docker.io
    repository: bitnamilegacy/mysql
    tag: "9.4.0-debian-12-r1"

  initdbScriptsConfigMap: "archer-db-mysql-init"

  auth:
    rootPassword: "rootpassword"   # Use existingSecret in production
    database: "gamedb"
    username: "gameuser"
    password: "gamepass"           # Use existingSecret in production
    existingSecret: ""

  primary:
    extraFlags: "--bind-address=0.0.0.0"  # Required for remote connections (backend, backup)
    persistence:
      enabled: true
      storageClass: ""
      size: 8Gi
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  secondary:
    replicaCount: 0

  metrics:
    enabled: false

  service:
    type: ClusterIP
    port: 3306

  volumePermissions:
    enabled: false

# Backup CronJob
backup:
  enabled: true
  schedule: "*/5 * * * *"
  pvcSize: 5Gi
  image: mysql:8.0
