# Custom values for Bitnami MySQL Helm chart
# Deploy with: helm install mysql bitnami/mysql -f mysql-values.yaml -n game

auth:
  rootPassword: "rootpassword"   # Change in production!
  database: "gamedb"
  username: "gameuser"
  password: "gamepass"           # Change in production!
  existingSecret: ""

primary:
  persistence:
    enabled: true
    storageClass: ""             # Use default StorageClass
    size: 8Gi
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  configuration: |-
    [mysqld]
    default_authentication_plugin=mysql_native_password
    skip-name-resolve
    explicit_defaults_for_timestamp
    basedir=/opt/bitnami/mysql
    plugin_dir=/opt/bitnami/mysql/lib/plugin
    port=3306
    socket=/opt/bitnami/mysql/tmp/mysql.sock
    datadir=/bitnami/mysql/data
    tmpdir=/opt/bitnami/mysql/tmp
    max_allowed_packet=16M
    bind-address=*
    pid-file=/opt/bitnami/mysql/tmp/mysqld.pid
    log-error=/opt/bitnami/mysql/logs/mysqld.log
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    slow_query_log=1
    slow_query_log_file=/opt/bitnami/mysql/logs/mysqld.log
    long_query_time=10.0

  initdbScriptsConfigMap: "mysql-init-scripts"

secondary:
  replicaCount: 0               # Set to 1+ for read replicas

metrics:
  enabled: false                # Set true if Prometheus is available

service:
  type: ClusterIP
  port: 3306

volumePermissions:
  enabled: false
