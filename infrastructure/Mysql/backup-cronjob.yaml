---
# PersistentVolumeClaim for storing MySQL backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-backup-pvc
  namespace: game
  labels:
    app: mysql-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: ""   # Uncomment and set if needed

---
# CronJob that runs mysqldump every 5 minutes (for demonstration)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: game
  labels:
    app: mysql-backup
spec:
  schedule: "*/5 * * * *"        # Every 5 minutes (demo); use "0 2 * * *" for nightly in prod
  concurrencyPolicy: Forbid      # Don't run a new job if previous one is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: mysql-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mysql-backup
              image: bitnami/mysql:8.0          # Contains mysqldump client
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
                  BACKUP_FILE="/backups/gamedb_${TIMESTAMP}.sql.gz"
                  echo "[$(date)] Starting backup -> ${BACKUP_FILE}"
                  mysqldump \
                    --host="${DB_HOST}" \
                    --port="${DB_PORT}" \
                    --user="${DB_USER}" \
                    --password="${DB_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --databases "${DB_NAME}" \
                  | gzip > "${BACKUP_FILE}"
                  echo "[$(date)] Backup completed: ${BACKUP_FILE} ($(du -sh ${BACKUP_FILE} | cut -f1))"

                  # Retention: remove backups older than 7 days
                  find /backups -name "gamedb_*.sql.gz" -mtime +7 -delete
                  echo "[$(date)] Old backups cleaned up."
              env:
                - name: DB_HOST
                  value: "mysql"              # Service name of MySQL in the cluster
                - name: DB_PORT
                  value: "3306"
                - name: DB_NAME
                  value: "gamedb"
                - name: DB_USER
                  value: "gameuser"
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql             # Bitnami MySQL creates this secret automatically
                      key: mysql-password     # Key in the Bitnami-generated secret
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mysql-backup-pvc
